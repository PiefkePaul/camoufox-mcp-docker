services:
  camoufox-mcp:
    build:
      context: .
    container_name: camoufox-mcp
    restart: unless-stopped
    init: true
    ports:
      - "${MCP_PORT:-3000}:3000"
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 3000
      MCP_PATH: ${MCP_PATH:-/mcp}
      MCP_HEALTH_PATH: ${MCP_HEALTH_PATH:-/health}
      MCP_ENABLE_JSON_RESPONSE: ${MCP_ENABLE_JSON_RESPONSE:-true}
      MCP_HTTP_SESSION_MODE: ${MCP_HTTP_SESSION_MODE:-stateless}
      MCP_DEBUG_LOCALE: ${MCP_DEBUG_LOCALE:-false}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-change-me}
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
