name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_REPO: piefkepaul/camoufox-mcp-docker
  GHCR_REPO: ghcr.io/${{ github.repository_owner }}/camoufox-mcp-docker
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'
    
    - name: Run all local tests
      run: npm run test:all
      timeout-minutes: 10

  build-and-publish-npm:
    name: Build and Publish to NPM
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        registry-url: 'https://registry.npmjs.org'
        package-manager-cache: false
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    - name: Publish to NPM
      run: npm publish --access public

  publish-clawhub:
    name: Publish ClawHub Bundle
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write   # OIDC trusted publishing to ClawHub

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'
        package-manager-cache: false

    # Auth: the clawhub CLI does NOT read CLAWHUB_TOKEN from the env — it requires an
    # explicit `clawhub login --token`. Set the CLAWHUB_TOKEN repo secret to an API token
    # for an account that can publish under scope @whit3rabbit.
    #
    # `clawhub package validate` writes reports/ INTO the source folder, and the
    # plugins/camoufox tree also carries generated evals/ and skills/camoufox-workspace/.
    # So we validate in place, then publish a clean staging dir containing only the
    # runtime bundle files (mirrors the manual procedure in AGENTS.md).
    - name: Publish @whit3rabbit/camoufox-mcp bundle
      env:
        CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      run: |
        set -euo pipefail
        if [ -z "${CLAWHUB_TOKEN:-}" ]; then
          echo "CLAWHUB_TOKEN secret is not set; cannot publish to ClawHub." >&2
          exit 1
        fi
        npx -y clawhub login --token "$CLAWHUB_TOKEN"
        npx -y clawhub package validate plugins/camoufox --json

        version="$(node -p 'require("./package.json").version')"
        stage="$(mktemp -d)"
        mkdir -p "$stage/.codex-plugin" "$stage/.claude-plugin" \
                 "$stage/skills/camoufox/agents" "$stage/skills/camoufox/references"
        cp plugins/camoufox/.codex-plugin/plugin.json "$stage/.codex-plugin/plugin.json"
        cp plugins/camoufox/.claude-plugin/plugin.json "$stage/.claude-plugin/plugin.json"
        cp plugins/camoufox/.mcp.json "$stage/.mcp.json"
        cp plugins/camoufox/openclaw.plugin.json "$stage/openclaw.plugin.json"
        cp plugins/camoufox/package.json "$stage/package.json"
        cp plugins/camoufox/skills/camoufox/SKILL.md "$stage/skills/camoufox/SKILL.md"
        cp plugins/camoufox/skills/camoufox/agents/openai.yaml "$stage/skills/camoufox/agents/openai.yaml"
        cp plugins/camoufox/skills/camoufox/references/json-rpc-debug.md "$stage/skills/camoufox/references/json-rpc-debug.md"
        cp plugins/camoufox/skills/camoufox/references/sequence-actions.md "$stage/skills/camoufox/references/sequence-actions.md"

        npx -y clawhub package publish "$stage" \
          --family bundle-plugin \
          --name @whit3rabbit/camoufox-mcp \
          --display-name "Camoufox MCP" \
          --owner whit3rabbit \
          --version "$version" \
          --source-repo whit3rabbit/camoufox-mcp \
          --source-commit "$GITHUB_SHA" \
          --source-ref "$GITHUB_REF_NAME" \
          --source-path plugins/camoufox \
          --json

  build-and-publish-docker:
    name: Build and Publish Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        username: piefkepaul
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ env.DOCKER_REPO }}
          ${{ env.GHCR_REPO }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker images
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: [build-and-publish-npm, build-and-publish-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v7

    - name: Resolve release version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## Release ${{ github.ref_name }}
          
          ### Installation
          
          **NPM:**
          ```bash
          npm install -g camoufox-mcp-server@${{ steps.version.outputs.version }}
          ```
          
          **Docker:**
          ```bash
          docker pull ${{ env.DOCKER_REPO }}:${{ steps.version.outputs.version }}
          docker pull ${{ env.GHCR_REPO }}:${{ steps.version.outputs.version }}
          ```
          
          **NPX (no installation):**
          ```bash
          npx camoufox-mcp-server@${{ steps.version.outputs.version }}
          ```
          
          ### Changelog
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
        draft: false
        prerelease: false
